name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Build Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: bludvim:ci
          build-args: |
            BASE_PLATFORM=linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          docker run --rm --platform linux/amd64 bludvim:ci \
            nvim --headless \
              "+lua assert(vim.version().major == 0 and vim.version().minor == 11 and vim.version().patch == 7)" \
              "+lua assert(package.loaded['fff'] == nil, 'fff loaded during startup')" \
              +qa
