name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: bludvim:ci
          build-args: |
            BASE_PLATFORM=linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          docker run --rm --platform linux/amd64 bludvim:ci \
            nvim --headless \
              "+lua assert(vim.version().major == 0 and vim.version().minor == 11 and vim.version().patch == 7)" \
              "+lua assert(package.loaded['fff'] == nil, 'fff loaded during startup')" \
              +qa
